packages:
  - "."

# Security overrides — force patched versions of transitive (build/dev-time)
# deps flagged by Dependabot. Scoped to the vulnerable ranges only so healthy
# majors already in the tree (js-yaml 4.x, yaml 2.9.x) are left untouched.
overrides:
  "js-yaml@<3.15.0": "3.15.0" # quadratic-DoS in merge keys (via gray-matter)
  "yaml@>=2.0.0 <2.8.3": "2.8.3" # stack-overflow on nested collections (via @astrojs/check)

allowBuilds:
  esbuild: true
  sharp: true
  workerd: true

minimumReleaseAgeExclude:
  - '@astrojs/markdown-satteri@0.3.1'
  - '@astrojs/mdx@7.0.0'
  - '@astrojs/react@6.0.0'
  - astro@7.0.0
  - node-html-parser@8.0.3
