name: Dependency review

# Flags vulnerable or disallowed dependencies introduced by a pull request.
# Free on public repositories (uses the GitHub dependency graph).
on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
