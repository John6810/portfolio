name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Least-privilege default token.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Build & type check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # astro check needs the generated content JSON (search index) that
      # SearchModal.tsx imports — produced by the json generator, not committed.
      - name: Generate content JSON
        run: pnpm run generate-json

      - name: Type check (astro check)
        run: pnpm run check

      - name: Format check (Prettier)
        run: pnpm exec prettier --check ./src

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: site-build
          path: dist/
          retention-days: 3
