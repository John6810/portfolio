name: Security

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 6 * * 1" # Monday 06:00 UTC

permissions:
  contents: read
  pull-requests: read # gitleaks lists PR commits on pull_request events

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Secret scanning across the full git history ──
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # ── Dependency vulnerabilities in shipped (runtime) deps ──
  deps:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Audit dependencies (fail on high/critical)
        run: pnpm audit --audit-level high

  # ── Misconfiguration scan (Dockerfile, configs) ──
  config:
    name: Config scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Trivy misconfiguration scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
